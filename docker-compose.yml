services:
  pg-master:
    image: postgres:16
    container_name: pg-master
    environment:
      POSTGRES_DB: social_network
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata-master:/var/lib/postgresql/data
      - ./docker/postgres/init-master.sh:/docker-entrypoint-initdb.d/init-master.sh
    command: postgres -c wal_level=replica
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  pg-slave-1:
    image: postgres:16
    container_name: pg-slave-1
    environment:
      PGUSER: postgres
      PGPASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pgdata-slave1:/var/lib/postgresql/data
    entrypoint: |
      bash -c '
      if [ ! -s "$$PGDATA/PG_VERSION" ]; then
        until pg_isready -h pg-master; do sleep 1; done
        PGPASSWORD=replicator_password pg_basebackup -h pg-master -U replicator -D "$$PGDATA" -Fp -Xs -R
      fi
      exec docker-entrypoint.sh postgres
      '
    depends_on:
      pg-master:
        condition: service_healthy

  pg-slave-2:
    image: postgres:16
    container_name: pg-slave-2
    environment:
      PGUSER: postgres
      PGPASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - pgdata-slave2:/var/lib/postgresql/data
    entrypoint: |
      bash -c '
      if [ ! -s "$$PGDATA/PG_VERSION" ]; then
        until pg_isready -h pg-master; do sleep 1; done
        PGPASSWORD=replicator_password pg_basebackup -h pg-master -U replicator -D "$$PGDATA" -Fp -Xs -R
      fi
      exec docker-entrypoint.sh postgres
      '
    depends_on:
      pg-master:
        condition: service_healthy

  app:
    build: .
    container_name: social-network-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_MASTER_URL: jdbc:postgresql://pg-master:5432/social_network
      SPRING_DATASOURCE_MASTER_USERNAME: postgres
      SPRING_DATASOURCE_MASTER_PASSWORD: postgres
      SPRING_DATASOURCE_SLAVE_URL: jdbc:postgresql://pg-slave-1:5432/social_network
      SPRING_DATASOURCE_SLAVE_USERNAME: postgres
      SPRING_DATASOURCE_SLAVE_PASSWORD: postgres
    depends_on:
      pg-master:
        condition: service_healthy

volumes:
  pgdata-master:
  pgdata-slave1:
  pgdata-slave2:
