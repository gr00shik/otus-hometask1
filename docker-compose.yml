services:
  pg-master:
    image: postgres:16
    container_name: pg-master
    environment:
      POSTGRES_DB: social_network
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata-master:/var/lib/postgresql/data
      - ./docker/postgres/init-master.sh:/docker-entrypoint-initdb.d/init-master.sh
    command: postgres -c wal_level=replica
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  pg-slave-1:
    image: postgres:16
    container_name: pg-slave-1
    environment:
      PGUSER: postgres
      PGPASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pgdata-slave1:/var/lib/postgresql/data
    entrypoint: |
      bash -c '
      if [ ! -s "$$PGDATA/PG_VERSION" ]; then
        until pg_isready -h pg-master; do sleep 1; done
        PGPASSWORD=replicator_password pg_basebackup -h pg-master -U replicator -D "$$PGDATA" -Fp -Xs -R
      fi
      exec docker-entrypoint.sh postgres
      '
    depends_on:
      pg-master:
        condition: service_healthy

  pg-slave-2:
    image: postgres:16
    container_name: pg-slave-2
    environment:
      PGUSER: postgres
      PGPASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - pgdata-slave2:/var/lib/postgresql/data
    entrypoint: |
      bash -c '
      if [ ! -s "$$PGDATA/PG_VERSION" ]; then
        until pg_isready -h pg-master; do sleep 1; done
        PGPASSWORD=replicator_password pg_basebackup -h pg-master -U replicator -D "$$PGDATA" -Fp -Xs -R
      fi
      exec docker-entrypoint.sh postgres
      '
    depends_on:
      pg-master:
        condition: service_healthy

  citus-master:
    container_name: citus_master
    image: "citusdata/citus:12.1.3"
    ports:
      - "5436:5432"
    labels: ["com.citusdata.role=Master"]
    environment: &CITUS_AUTH
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGUSER: postgres
      PGPASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - citus-master-data:/var/lib/postgresql/data
      - ./docker/citus/init-dialog.sql:/docker-entrypoint-initdb.d/init-dialog.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  citus-worker:
    image: "citusdata/citus:12.1.3"
    labels: ["com.citusdata.role=Worker"]
    depends_on: [citus-manager]
    environment: *CITUS_AUTH
    command: "/wait-for-manager.sh"
    volumes:
      - healthcheck-volume:/healthcheck

  citus-manager:
    container_name: citus_manager
    image: "citusdata/membership-manager:0.3.0"
    volumes:
      - "${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock"
      - healthcheck-volume:/healthcheck
    depends_on: [citus-master]
    environment: *CITUS_AUTH

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: social-network-app
    ports:
      - "8080:8080"
      - "5005:5005"
    environment:
      SPRING_DATASOURCE_MASTER_URL: jdbc:postgresql://pg-master:5432/social_network
      SPRING_DATASOURCE_MASTER_USERNAME: postgres
      SPRING_DATASOURCE_MASTER_PASSWORD: postgres
      SPRING_DATASOURCE_SLAVE_URL: jdbc:postgresql://pg-slave-1:5432/social_network
      SPRING_DATASOURCE_SLAVE_USERNAME: postgres
      SPRING_DATASOURCE_SLAVE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATASOURCE_CITUS_URL: jdbc:postgresql://citus-master:5432/postgres
      SPRING_DATASOURCE_CITUS_USERNAME: postgres
      SPRING_DATASOURCE_CITUS_PASSWORD: postgres
    depends_on:
      pg-master:
        condition: service_healthy
      redis:
        condition: service_healthy
      citus-master:
        condition: service_healthy

volumes:
  pgdata-master:
  pgdata-slave1:
  pgdata-slave2:
  redis-data:
  citus-master-data:
  healthcheck-volume:
